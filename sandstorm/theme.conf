$menu_styled = wofi -s ~/.config/hypr/sandstorm/wofi/style.css
$menu = $menu_styled --show drun
$terminal = foot -c ~/.config/hypr/sandstorm/foot/themes/gruvbox-dark.ini
$fileManager = dolphin
$waybar = waybar -c ~/.config/hypr/sandstorm/waybar/config.jsonc -s ~/.config/hypr/sandstorm/waybar/style.css
$killbar = pkill waybar
$lock = swaylock -i ~/.config/hypr/sandstorm/bluehour.jpg

env = THEME,sandstorm

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 5

    border_size = 2


    col.active_border = rgb(ffff00) rgb(c5003c) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# Set background and start waybar theme
exec = pkill swaybg; true && swaybg -o "*" -i ~/.config/hypr/sandstorm/bluehour.jpg -m fill
exec = pkill waybar; true && $waybar
